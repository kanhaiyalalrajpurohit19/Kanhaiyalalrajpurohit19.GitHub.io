<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Khushiyon Ka Game</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #222;
    color: white;
    text-align: center;
    margin: 0;
}

#startScreen, #gameScreen, #resultScreen {
    display: none;
    padding: 20px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #ff9800;
    color: black;
}

canvas {
    background: #eee;
    border-radius: 50%;
    margin-top: 20px;
}

h1 {
    color: #ffeb3b;
}
</style>
</head>

<body>

<!-- Start Screen -->
<div id="startScreen">
    <h1>🎉 Khushiyon Ka Game 🎉</h1>
    <p>Nishanebazi ka mazedaar game</p>
    <button onclick="startGame()">Play Game</button>
</div>

<!-- Game Screen -->
<div id="gameScreen">
    <h2>🎯 Nishan Lagao!</h2>
    <p>Mauke: <span id="shots">10</span> | Score: <span id="score">0</span></p>
    <canvas id="target" width="400" height="400"></canvas>
</div>

<!-- Result Screen -->
<div id="resultScreen">
    <h2>🏆 Result</h2>
    <p>Total Score: <span id="finalScore"></span></p>
    <p>Position: <span id="position"></span></p>
    <button onclick="location.reload()">Dobara Khelo</button>
</div>

<script>
let shotsLeft = 10;
let score = 0;

const canvas = document.getElementById("target");
const ctx = canvas.getContext("2d");
const centerX = 200;
const centerY = 200;

function drawTarget() {
    ctx.clearRect(0, 0, 400, 400);

    // Big circle (2 points)
    ctx.beginPath();
    ctx.arc(centerX, centerY, 150, 0, Math.PI * 2);
    ctx.fillStyle = "red";
    ctx.fill();

    // Medium circle (5 points)
    ctx.beginPath();
    ctx.arc(centerX, centerY, 100, 0, Math.PI * 2);
    ctx.fillStyle = "blue";
    ctx.fill();

    // Small circle (10 points)
    ctx.beginPath();
    ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
    ctx.fillStyle = "gold";
    ctx.fill();
}

canvas.addEventListener("click", function(e) {
    if (shotsLeft <= 0) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const distance = Math.sqrt(
        Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2)
    );

    if (distance <= 50) score += 10;
    else if (distance <= 100) score += 5;
    else if (distance <= 150) score += 2;

    shotsLeft--;
    document.getElementById("shots").innerText = shotsLeft;
    document.getElementById("score").innerText = score;

    if (shotsLeft === 0) endGame();
});

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    drawTarget();
}

function endGame() {
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("resultScreen").style.display = "block";
    document.getElementById("finalScore").innerText = score;

    let pos = "Fourth";
    if (score >= 80) pos = "First";
    else if (score >= 60) pos = "Second";
    else if (score >= 40) pos = "Third";

    document.getElementById("position").innerText = pos;
}

document.getElementById("startScreen").style.display = "block";
</script>

</body>
</html>
