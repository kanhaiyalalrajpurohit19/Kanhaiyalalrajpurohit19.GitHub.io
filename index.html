gun.mp3   (banduk ki awaaz<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shooting Target Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background: linear-gradient(#0b3d0b,#2e7d32,#66bb6a);
}

/* river */
#river{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background: linear-gradient(#0d47a1,#42a5f5);
    opacity:0.8;
}

/* entrance */
#start{
    position:absolute;
    inset:0;
    background:linear-gradient(#1b5e20,#4caf50);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    z-index:20;
}
#start button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
}

/* UI */
#ui{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
    font-size:18px;
    text-shadow:2px 2px 5px black;
}

canvas{ display:block; }

/* result */
#result{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.9);
    color:white;
    display:none;
    text-align:center;
    padding-top:40px;
}
#result button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:gold;
}
</style>
</head>

<body>

<audio id="gunSound" src="gun.mp3"></audio>

<div id="start">
    <h1>🎮 PLAYING GAMES 🎮</h1>
    <button onclick="startGame()">Start</button>
</div>

<div id="ui">
    Bullets: <span id="shots">10</span> |
    Score: <span id="score">0</span>
</div>

<canvas id="game"></canvas>
<div id="river"></div>

<div id="result">
    <h2>🏆 Final Score</h2>
    <p>Your Score: <span id="finalScore"></span></p>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

const gunSound = document.getElementById("gunSound");

let shots = 10;
let score = 0;

/* gun position */
const gun = { x: 80, y: canvas.height-180 };

/* target */
const target = {
    x: canvas.width/2,
    y: canvas.height/2,
    r1: 30,
    r2: 60,
    r3: 90
};

/* draw target */
function drawTarget(){
    ctx.save();
    ctx.translate(target.x,target.y);

    ctx.fillStyle="red";
    ctx.beginPath(); ctx.arc(0,0,target.r3,0,Math.PI*2); ctx.fill();

    ctx.fillStyle="blue";
    ctx.beginPath(); ctx.arc(0,0,target.r2,0,Math.PI*2); ctx.fill();

    ctx.fillStyle="gold";
    ctx.beginPath(); ctx.arc(0,0,target.r1,0,Math.PI*2); ctx.fill();

    ctx.restore();
}

/* draw gun */
function drawGun(){
    ctx.fillStyle="#333";
    ctx.fillRect(gun.x,gun.y,60,20);
    ctx.fillRect(gun.x+50,gun.y-10,25,10);
}

/* redraw */
function redraw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawTarget();
    drawGun();
}

/* shooting */
canvas.addEventListener("click",e=>{
    if(shots<=0) return;

    gunSound.currentTime=0;
    gunSound.play();

    const dx=e.clientX-target.x;
    const dy=e.clientY-target.y;
    const d=Math.sqrt(dx*dx+dy*dy);

    if(d<=target.r1) score+=10;
    else if(d<=target.r2) score+=5;
    else if(d<=target.r3) score+=3;

    shots--;
    shotsEl.innerText=shots;
    scoreEl.innerText=score;

    if(shots===0) endGame();
});

/* move gun up/down (touch) */
canvas.addEventListener("touchmove",e=>{
    gun.y=e.touches[0].clientY;
    redraw();
});

function startGame(){
    document.getElementById("start").style.display="none";
    redraw();
}

function endGame(){
    document.getElementById("finalScore").innerText=score;
    document.getElementById("result").style.display="block";
}

const shotsEl=document.getElementById("shots");
const scoreEl=document.getElementById("score");
</script>

</body>
</html>
