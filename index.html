<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archery Arrow Game</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") no-repeat center center fixed;
    background-size: cover;
    color: white;
    text-align: center;
}

.screen {
    display: none;
    padding-top: 80px;
}

button {
    padding: 14px 30px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: gold;
    color: black;
}

canvas {
    background: rgba(255,255,255,0.9);
    margin-top: 20px;
    border-radius: 20px;
}

h1, h2 {
    text-shadow: 2px 2px 6px black;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="start" class="screen">
    <h1>🏹 GAME PLAYING 🏹</h1>
    <p>Arrow se Nishana Lagao</p>
    <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">
    <h2>🎯 Archery Game</h2>
    <p>Shots Left: <span id="shots">10</span> | Score: <span id="score">0</span></p>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="screen">
    <h2>🏆 Final Result</h2>
    <p>Your Score: <span id="finalScore"></span></p>

    <h3>Top 10 Players</h3>
    <ol id="leaderboard"></ol>

    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let shots = 10;
let score = 0;

const target = { x: 420, y: 200 };
const arrow = { x: 80, y: 200 };

function drawTarget() {
    // outer = 3
    ctx.beginPath();
    ctx.arc(target.x, target.y, 90, 0, Math.PI*2);
    ctx.fillStyle = "red";
    ctx.fill();

    // middle = 5
    ctx.beginPath();
    ctx.arc(target.x, target.y, 60, 0, Math.PI*2);
    ctx.fillStyle = "blue";
    ctx.fill();

    // center = 10
    ctx.beginPath();
    ctx.arc(target.x, target.y, 30, 0, Math.PI*2);
    ctx.fillStyle = "gold";
    ctx.fill();
}

function drawBowArrow() {
    // bow
    ctx.beginPath();
    ctx.arc(60, 200, 50, -0.5*Math.PI, 0.5*Math.PI);
    ctx.strokeStyle = "brown";
    ctx.lineWidth = 5;
    ctx.stroke();

    // arrow
    ctx.beginPath();
    ctx.moveTo(arrow.x, arrow.y);
    ctx.lineTo(arrow.x + 40, arrow.y);
    ctx.strokeStyle = "black";
    ctx.lineWidth = 3;
    ctx.stroke();

    // arrow head
    ctx.beginPath();
    ctx.moveTo(arrow.x + 40, arrow.y);
    ctx.lineTo(arrow.x + 32, arrow.y - 6);
    ctx.lineTo(arrow.x + 32, arrow.y + 6);
    ctx.fill();
}

function redraw() {
    ctx.clearRect(0,0,600,400);
    drawTarget();
    drawBowArrow();
}

canvas.addEventListener("click", e => {
    if (shots <= 0) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const d = Math.sqrt(
        Math.pow(x - target.x,2) +
        Math.pow(y - target.y,2)
    );

    if (d <= 30) score += 10;
    else if (d <= 60) score += 5;
    else if (d <= 90) score += 3;

    shots--;
    document.getElementById("shots").innerText = shots;
    document.getElementById("score").innerText = score;

    if (shots === 0) endGame();
});

function startGame() {
    document.getElementById("start").style.display = "none";
    document.getElementById("game").style.display = "block";
    redraw();
}

function endGame() {
    document.getElementById("game").style.display = "none";
    document.getElementById("result").style.display = "block";
    document.getElementById("finalScore").innerText = score;

    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    for (let i=1;i<=10;i++) {
        const li = document.createElement("li");
        li.innerText = "Player " + i + " – Score " + (Math.floor(Math.random()*80)+20);
        list.appendChild(li);
    }
}

document.getElementById("start").style.display = "block";
</script>

</body>
</html>
