<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Jodhpur Mishthan Bhandar</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2ecc71, #a8e063);
        }

        header {
            background-color: #0b6623;
            color: white;
            padding: 25px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 40px;
        }

        header p {
            font-size: 18px;
        }

        .container {
            padding: 30px;
        }

        .sweets {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .sweet-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            padding: 15px;
        }

        .sweet-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .sweet-card h3 {
            margin: 10px 0 5px;
        }

        .price {
            color: green;
            font-weight: bold;
            font-size: 18px;
        }

        footer {
            background-color: #0b6623;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 30px;
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .option-box {
            background: white;
            color: #0b6623;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>Jodhpur Mishthan Bhandar</h1>
    <p>Owner: Kanhaiya Rajpurohit</p>
</header>

<div class="container">
    <div class="sweets">

        <div class="sweet-card">
            <img src="https://source.unsplash.com/400x300/?rasgulla" alt="Rasgulla">
            <h3>Rasgulla</h3>
            <div class="price">₹350 / Kg</div>
        </div>

        <div class="sweet-card">
            <img src="https://source.unsplash.com/400x300/?gulab-jamun" alt="Gulab Jamun">
            <h3>Gulab Jamun</h3>
            <div class="price">₹320 / Kg</div>
        </div>

        <div class="sweet-card">
            <img src="https://source.unsplash.com/400x300/?rasmalai" alt="Rasmalai">
            <h3>Rasmalai</h3>
            <div class="price">₹450 / Kg</div>
        </div>

        <div class="sweet-card">
            <img src="https://source.unsplash.com/400x300/?kaju-katli" alt="Kaju Katli">
            <h3>Kaju Katli</h3>
            <div class="price">₹900 / Kg</div>
        </div>

        <div class="sweet-card">
            <img src="https://source.unsplash.com/400x300/?barfi" alt="Kesar Barfi">
            <h3>Kesar Barfi</h3>
            <div class="price">₹650 / Kg</div>
        </div>

        <div class="sweet-card">
            <img src="https://source.unsplash.com/400x300/?imarti" alt="Imarti">
            <h3>Imarti</h3>
            <div class="price">₹400 / Kg</div>
        </div>

        <div class="sweet-card">
            <img src="https://source.unsplash.com/400x300/?halwa" alt="Pak Halwa">
            <h3>Pak Halwa</h3>
            <div class="price">₹380 / Kg</div>
        </div>

        <div class="sweet-card">
            <img src="https://source.unsplash.com/400x300/?indian-sweets" alt="Rasbhari">
            <h3>Rasbhari</h3>
            <div class="price">₹420 / Kg</div>
        </div>

    </div>
</div>

<footer>
    <h3>🙏 Om</h3>

    <div class="options">
        <div class="option-box">📩 Message</div>
        <div class="option-box">🕉 Om</div>
        <div class="option-box">📞 Contact</div>
    </div>

    <p style="margin-top:15px;">© 2026 Jodhpur Mishthan Bhandar</p>
</footer>

</body>
</html>
