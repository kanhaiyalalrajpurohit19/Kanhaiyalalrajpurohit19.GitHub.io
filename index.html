<html lang="en">

<meta charset="UTF-8">
<title>Marble & Granite | Kanhaiya Rajpurohit</title>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* NAVBAR */
nav{
    background:#222;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
nav .logo{
    color:#fff;
    font-size:18px;
    font-weight:bold;
}
nav a{
    color:#fff;
    margin:0 10px;
    text-decoration:none;
    font-size:15px;
}
nav a:hover{
    text-decoration:underline;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    background:#ddd;
}
header h1{
    margin:5px 0;
}
.owner{
    font-size:14px;
    color:#555;
}

/* SECTIONS */
.section-title{
    text-align:center;
    margin-top:30px;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}
.card{
    background:#fff;
    border-radius:8px;
    box-shadow:0 3px 6px rgba(0,0,0,0.2);
    overflow:hidden;
}
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}
.info{
    padding:10px;
}
.info h3{
    margin:0;
    font-size:16px;
}
.info p{
    margin:4px 0;
    font-size:14px;
}

/* CONTACT */
.contact{
    padding:20px;
    text-align:center;
}
